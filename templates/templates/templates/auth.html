<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{% if mode == 'login' %}Кіру{% else %}Тіркелу{% endif %} — InnovationEdu</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}"/>
</head>
<body>
<nav class="navbar">
  <a href="/" class="nav-logo"><span class="logo-icon">⬡</span> InnovationEdu</a>
  <div></div>
  <a href="/" class="btn-nav-ghost">← Басты бетке</a>
</nav>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-icon">⬡</span>
      <h2>Админ жүйесі</h2>
      <p>Сайтты басқару порталы</p>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab {% if mode == 'login' %}active{% endif %}" onclick="location.href='/login'">Кіру</button>
      <button class="auth-tab {% if mode == 'register' %}active{% endif %}" onclick="location.href='/register'">Тіркелу</button>
    </div>
    <div class="alert alert-error" id="alertErr"></div>
    <div class="alert alert-success" id="alertOk"></div>
    {% if mode == 'login' %}
    <div class="form-group">
      <label class="form-label">Логин</label>
      <input type="text" class="form-input" id="username" placeholder="Логиніңізді енгізіңіз"/>
    </div>
    <div class="form-group">
      <label class="form-label">Пароль</label>
      <input type="password" class="form-input" id="password" placeholder="Паролді енгізіңіз" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn btn-primary btn-full" onclick="doLogin()">Кіру</button>
    <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--ink-3);">Тіркелмедіңіз бе? <a href="/register" style="color:var(--accent);">Тіркелу</a></p>
    <script>
    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const err = document.getElementById('alertErr');
      err.classList.remove('show');
      if (!username || !password) { err.textContent='Барлық өрістерді толтырыңыз'; err.classList.add('show'); return; }
      const res = await fetch('/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username,password}) });
      const data = await res.json();
      if (data.success) { location.href = data.redirect; }
      else { err.textContent = data.message; err.classList.add('show'); }
    }
    </script>
    {% else %}
    <div class="form-group">
      <label class="form-label">Логин</label>
      <input type="text" class="form-input" id="username" placeholder="Логин жасаңыз"/>
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-input" id="email" placeholder="email@mektep.kz"/>
    </div>
    <div class="form-group">
      <label class="form-label">Пароль</label>
      <input type="password" class="form-input" id="password" placeholder="Кемінде 6 таңба"/>
    </div>
    <button class="btn btn-primary btn-full" onclick="doRegister()">Тіркелу →</button>
    <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--ink-3);">Аккаунт бар ма? <a href="/login" style="color:var(--accent);">Кіру</a></p>
    <script>
    async function doRegister() {
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const err = document.getElementById('alertErr');
      const ok = document.getElementById('alertOk');
      err.classList.remove('show'); ok.classList.remove('show');
      if (!username||!email||!password) { err.textContent='Барлық өрістерді толтырыңыз'; err.classList.add('show'); return; }
      const res = await fetch('/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username,email,password}) });
      const data = await res.json();
      if (data.success) { ok.textContent=data.message+' Кіру бетіне өтіңіз.'; ok.classList.add('show'); setTimeout(()=>location.href='/login',1800); }
      else { err.textContent=data.message; err.classList.add('show'); }
    }
    </script>
    {% endif %}
    <div style="margin-top:20px;padding:14px;background:var(--surface-2);border-radius:var(--radius-sm);">
      <p style="font-size:12px;color:var(--ink-3);text-align:center;">🔒 Паролдер bcrypt арқылы шифрланады</p>
    </div>
  </div>
</div>
</body>
</html>
